<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — ScrapChain</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;700&family=Space+Mono:wght@400;700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
  <style>
    .auth-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 120px 24px 80px;
    }

    .auth-box {
      width: 100%;
      max-width: 420px;
      background: var(--mid);
      border: 1px solid rgba(200, 241, 53, 0.15);
      padding: 48px;
      position: relative;
    }

    .auth-back {
      position: absolute;
      top: 16px;
      right: 16px;
      padding: 8px 12px;
      font-size: 12px;
      background: transparent;
      border: 1px solid rgba(200,241,53,0.15);
      color: var(--muted);
      text-decoration: none;
      border-radius: 4px;
      cursor: pointer;
      transition: all 0.2s;
      min-height: 36px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
    .auth-back:hover { color: var(--lime); border-color: var(--lime); }

    .auth-box h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 36px;
      margin-bottom: 8px;
    }

    .auth-box p {
      color: var(--muted);
      font-size: 14px;
      margin-bottom: 24px;
    }

    .auth-box label {
      display: block;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .auth-box input {
      width: 100%;
      background: var(--soil);
      border: 1px solid rgba(200, 241, 53, 0.2);
      color: var(--sand);
      padding: 14px 18px;
      font-family: inherit;
      font-size: 15px;
      margin-bottom: 16px;
    }

    .auth-box input:focus {
      outline: none;
      border-color: var(--lime);
    }

    .auth-box button {
      width: 100%;
      background: var(--lime);
      color: var(--dark);
      padding: 16px;
      font-weight: 700;
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: 1px;
      border: none;
      cursor: pointer;
      font-family: inherit;
      min-height: 48px;
      border-radius: 4px;
    }

    .auth-box button:hover {
      background: var(--rust);
      color: #fff;
    }

    .auth-box .error {
      color: var(--rust);
      font-size: 13px;
      margin-bottom: 16px;
    }

    .auth-box a {
      color: var(--lime);
      text-decoration: none;
      font-size: 14px;
    }

    .auth-box a:hover {
      text-decoration: underline;
    }

    .auth-links {
      margin-top: 24px;
      text-align: center;
    }
    
    /* Mobile responsive */
    @media (max-width: 768px) {
      .auth-page {
        padding: 100px 16px 60px;
      }
      .auth-box {
        padding: 36px 24px;
      }
      .auth-box h1 {
        font-size: 32px;
      }
      .auth-box p {
        font-size: 13px;
        margin-bottom: 20px;
      }
      .auth-box label {
        font-size: 11px;
        margin-bottom: 6px;
      }
      .auth-box input {
        padding: 12px 16px;
        font-size: 16px;
        margin-bottom: 14px;
      }
      .auth-box button {
        padding: 14px;
        font-size: 13px;
      }
    }
    
    @media (max-width: 600px) {
      .auth-page {
        padding: 90px 12px 50px;
      }
      .auth-box {
        max-width: 100%;
        padding: 28px 20px;
      }
      .auth-back {
        top: 12px;
        right: 12px;
        padding: 6px 10px;
        font-size: 11px;
        min-height: 32px;
      }
      .auth-box h1 {
        font-size: 28px;
        margin-bottom: 6px;
      }
      .auth-box p {
        font-size: 12px;
        margin-bottom: 18px;
      }
      .auth-box label {
        font-size: 10px;
        margin-bottom: 5px;
      }
      .auth-box input {
        padding: 12px 14px;
        font-size: 16px;
        margin-bottom: 12px;
        border-radius: 3px;
      }
      .auth-box button {
        padding: 12px;
        font-size: 12px;
        min-height: 44px;
      }
      .auth-links {
        margin-top: 18px;
      }
      .auth-box a {
        font-size: 13px;
      }
    }
  </style>
</head>

<body>
  <div class="auth-page">
    <div class="auth-box">
      <a href="../index.html" class="logo" style="display:inline-block;margin-bottom:24px;">Scrap<span>Chain</span></a>
      <a href="../index.html" class="auth-back">← Back</a>
      <h1>Welcome Back</h1>
      <p>Sign in to access your ScrapChain dashboard.</p>
      <div id="error" class="error" style="display:none;"></div>
      <form id="loginForm">
        <label for="emailOrPhone">Email or Phone Number</label>
        <input type="text" id="emailOrPhone" name="emailOrPhone" required autocomplete="username">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" required minlength="6" autocomplete="current-password">
        <button type="submit">Sign In</button>
      </form>
      <div class="auth-links">
        <a href="register.html">Need an account? Register</a>
      </div>
    </div>
  </div>
  <script src="../js/api.js"></script>
  <script src="../js/auth.js"></script>
  <script>
    if (auth.isLoggedIn()) auth.redirectByRole();
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const errEl = document.getElementById('error');
      errEl.style.display = 'none';
      try {
        const data = await api.post('/api/auth/login', {
          emailOrPhone: document.getElementById('emailOrPhone').value,
          password: document.getElementById('password').value,
        });
        localStorage.setItem('scrapchain_token', data.token);
        localStorage.setItem('scrapchain_user', JSON.stringify(data.user));
        auth.redirectByRole();
      } catch (err) {
        errEl.textContent = err.message || 'Login failed';
        errEl.style.display = 'block';
      }
    });
  </script>
</body>

</html>
