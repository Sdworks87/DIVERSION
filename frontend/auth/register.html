<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register — ScrapChain</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;700&family=Space+Mono:wght@400;700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
  <style>
    .auth-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 120px 24px 80px;
    }

    .auth-box {
      width: 100%;
      max-width: 420px;
      background: var(--mid);
      border: 1px solid rgba(200, 241, 53, 0.15);
      padding: 48px;
      position: relative;
    }

    .auth-back {
      position: absolute;
      top: 16px;
      right: 16px;
      padding: 6px 10px;
      font-size: 13px;
      background: transparent;
      border: 1px solid rgba(200,241,53,0.15);
      color: var(--muted);
      text-decoration: none;
      border-radius: 4px;
    }
    .auth-back:hover { color: var(--lime); border-color: var(--lime); }

    .auth-box h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 36px;
      margin-bottom: 8px;
    }

    .auth-box p {
      color: var(--muted);
      font-size: 14px;
      margin-bottom: 24px;
    }

    .auth-box label {
      display: block;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .auth-box input,
    .auth-box select {
      width: 100%;
      background: var(--soil);
      border: 1px solid rgba(200, 241, 53, 0.2);
      color: var(--sand);
      padding: 14px 18px;
      font-family: inherit;
      font-size: 15px;
      margin-bottom: 16px;
    }

    .auth-box input:focus,
    .auth-box select:focus {
      outline: none;
      border-color: var(--lime);
    }

    .auth-box select option {
      background: var(--soil);
      color: var(--sand);
    }

    .auth-box button {
      width: 100%;
      background: var(--lime);
      color: var(--dark);
      padding: 16px;
      font-weight: 700;
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: 1px;
      border: none;
      cursor: pointer;
      font-family: inherit;
    }

    .auth-box button:hover {
      background: var(--rust);
      color: #fff;
    }

    .auth-box .error {
      color: var(--rust);
      font-size: 13px;
      margin-bottom: 16px;
    }

    .auth-box a {
      color: var(--lime);
      text-decoration: none;
      font-size: 14px;
    }

    .auth-box a:hover {
      text-decoration: underline;
    }

    .auth-links {
      margin-top: 24px;
      text-align: center;
    }
  </style>
</head>

<body>
  <div class="auth-page">
    <div class="auth-box">
      <a href="../index.html" class="logo" style="display:inline-block;margin-bottom:24px;">Scrap<span>Chain</span></a>
      <a href="../index.html" class="auth-back">← Back</a>
      <h1>Join the Network</h1>
      <p>Create an account and choose your role to get started.</p>
      <div id="error" class="error" style="display:none;"></div>
      <form id="registerForm">
        <label for="name">Full Name</label>
        <input type="text" id="name" name="name" required autocomplete="name">
        <label for="contact">Email or Phone Number</label>
        <input type="text" id="contact" name="contact" required autocomplete="username"
          placeholder="e.g. you@example.com or +919876543210">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" required minlength="6" autocomplete="new-password">
        <label for="role">I am a</label>
        <select id="role" name="role" required>
          <option value="citizen">Citizen (Household)</option>
          <option value="kabadi">Kabadi-wala (Scrap Dealer)</option>
          <option value="recycler">Recycler / Industry</option>
        </select>
        <button type="submit">Create Account</button>
      </form>
      <div class="auth-links">
        <a href="login.html">Already have an account? Sign in</a>
      </div>
    </div>
  </div>
  <script src="../js/api.js"></script>
  <script src="../js/auth.js"></script>
  <script>
    if (auth.isLoggedIn()) auth.redirectByRole();
    document.getElementById('registerForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const errEl = document.getElementById('error');
      errEl.style.display = 'none';
      try {
        const rawContact = document.getElementById('contact').value.trim();
        const isPhone = /^\d+$/.test(rawContact.replace(/[\s\+\-\(\)]/g, ''));

        const payload = {
          name: document.getElementById('name').value,
          password: document.getElementById('password').value,
          role: document.getElementById('role').value,
        };

        if (isPhone) {
          payload.phone = rawContact;
        } else {
          payload.email = rawContact;
        }

        const data = await api.post('/api/auth/register', payload);
        localStorage.setItem('scrapchain_token', data.token);
        localStorage.setItem('scrapchain_user', JSON.stringify(data.user));
        auth.redirectByRole();
      } catch (err) {
        errEl.textContent = err.message || 'Registration failed';
        errEl.style.display = 'block';
      }
    });
  </script>
</body>

</html>
