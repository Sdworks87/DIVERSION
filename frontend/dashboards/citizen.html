<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Citizen Dashboard — ScrapChain</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;700&family=Space+Mono:wght@400;700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
  <style>
    .dash {
      padding: 120px 48px 80px;
      max-width: 900px;
      margin: 0 auto;
    }

    .dash h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 48px;
      margin-bottom: 8px;
    }

    .dash .sub {
      color: var(--muted);
      margin-bottom: 40px;
    }

    .dash-card {
      background: var(--mid);
      border: 1px solid rgba(200, 241, 53, 0.15);
      padding: 32px;
      margin-bottom: 24px;
    }

    .dash-card h2 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 24px;
      margin-bottom: 20px;
    }

    .dash label {
      display: block;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .dash input,
    .dash textarea,
    .dash select {
      width: 100%;
      background: var(--soil);
      border: 1px solid rgba(200, 241, 53, 0.2);
      color: var(--sand);
      padding: 14px 18px;
      font-family: inherit;
      font-size: 15px;
      margin-bottom: 20px;
    }

    .dash textarea {
      min-height: 80px;
      resize: vertical;
    }

    .dash .btn {
      background: var(--lime);
      color: var(--dark);
      padding: 14px 24px;
      font-weight: 700;
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 1px;
      border: none;
      cursor: pointer;
      font-family: inherit;
    }

    .dash .btn:hover {
      background: var(--rust);
      color: #fff;
    }

    .dash .btn-ghost {
      background: transparent;
      border: 1px solid var(--lime);
      color: var(--lime);
    }

    .dash .btn-ghost:hover {
      background: rgba(200, 241, 53, 0.1);
    }

    .dash .error {
      color: var(--rust);
      font-size: 13px;
      margin-bottom: 16px;
    }

    .dash .estimate-result {
      background: var(--soil);
      padding: 20px;
      margin-top: 16px;
    }

    .dash .pickup-list {
      list-style: none;
    }

    .dash .pickup-item {
      padding: 16px;
      border-bottom: 1px solid rgba(200, 241, 53, 0.1);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .dash .pickup-item:last-child {
      border-bottom: none;
    }

    .dash .nav-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 32px;
    }

    /* New Cart UI Styles */
    .material-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
      gap: 16px;
      margin-bottom: 24px;
    }

    .mat-card {
      background: var(--soil);
      border: 1px solid rgba(200, 241, 53, 0.1);
      border-radius: 12px;
      padding: 16px;
      cursor: pointer;
      text-align: center;
      transition: all 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .mat-card:hover {
      border-color: var(--lime);
      background: rgba(200, 241, 53, 0.05);
      transform: translateY(-4px);
      box-shadow: 0 8px 24px rgba(200, 241, 53, 0.1);
    }

    .mat-icon {
      font-size: 32px;
      margin-bottom: 8px;
      display: inline-block;
      filter: drop-shadow(0 4px 12px rgba(200, 241, 53, 0.2));
    }

    .mat-name {
      font-size: 13px;
      font-weight: 700;
      color: var(--sand);
      margin-bottom: 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .mat-price {
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      color: var(--lime);
    }

    .cart-section {
      background: rgba(0, 0, 0, 0.3);
      border: 1px dashed rgba(200, 241, 53, 0.3);
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 24px;
    }

    .cart-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    }

    .cart-header h3 {
      font-family: 'Space Mono', monospace;
      font-size: 13px;
      color: var(--lime);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin: 0;
    }

    .cart-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 0;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    }

    .cart-item:last-child {
      border-bottom: none;
    }

    .cart-item-info {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .cart-item-icon {
      font-size: 24px;
      background: rgba(200, 241, 53, 0.1);
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 8px;
      border: 1px solid rgba(200, 241, 53, 0.2);
    }

    .cart-item-name {
      font-size: 14px;
      font-weight: 500;
      color: var(--sand);
    }

    .cart-item-price {
      font-family: 'Space Mono', monospace;
      font-size: 12px;
      color: var(--muted);
      margin-top: 2px;
    }

    .cart-controls {
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--dark);
      padding: 4px;
      border-radius: 6px;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .cart-btn {
      background: transparent;
      border: none;
      color: var(--sand);
      width: 28px;
      height: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      border-radius: 4px;
      font-size: 16px;
      transition: all 0.2s;
    }

    .cart-btn:hover {
      background: rgba(255, 255, 255, 0.1);
      color: var(--lime);
    }

    .cart-btn.remove:hover {
      color: var(--rust);
    }

    .cart-qty {
      font-family: 'Space Mono', monospace;
      font-size: 13px;
      width: 40px;
      text-align: center;
      background: transparent;
      border: none;
      color: var(--lime);
      padding: 0;
      margin: 0;
    }

    /* Hide arrows in input[type=number] */
    .cart-qty::-webkit-outer-spin-button,
    .cart-qty::-webkit-inner-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }

    .cart-qty[type=number] {
      -moz-appearance: textfield;
      appearance: textfield;
    }

    .cart-qty:focus {
      outline: none;
      border-bottom: 1px solid var(--lime);
    }

    .cart-total {
      margin-top: 20px;
      background: var(--lime);
      color: var(--dark);
      padding: 16px 20px;
      border-radius: 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-weight: 700;
    }

    .cart-total-label {
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .cart-total-value {
      font-family: 'Space Mono', monospace;
      font-size: 24px;
    }

    .empty-cart {
      color: var(--muted);
      text-align: center;
      padding: 24px 0;
      font-size: 13px;
      font-family: 'Space Mono', monospace;
    }
  </style>
</head>

<body>
  <div class="dash">
    <nav
      style="position:fixed;top:0;left:0;right:0;background:var(--dark);padding:20px 48px;border-bottom:1px solid rgba(200,241,53,0.1);display:flex;justify-content:space-between;align-items:center;z-index:100;">
      <a href="../index.html" class="logo">Scrap<span>Chain</span></a>
      <span id="userName" style="color:var(--muted);"></span>
      <button class="btn btn-ghost" id="logoutBtn">Logout</button>
    </nav>

    <h1>Schedule Pickup</h1>
    <p class="sub">Upload a photo or select materials, get an estimate, and schedule your pickup.</p>

    <div class="dash-card">
      <h2>New Pickup</h2>
      <div id="pickupError" class="error" style="display:none;"></div>
      <form id="pickupForm">
        <label for="address">Address</label>
        <textarea id="address" name="address" required placeholder="Your full address"></textarea>
        <label style="margin-bottom: 16px;">1. Select Waste Materials</label>
        <div id="materialGrid" class="material-grid">
          <div style="color:var(--muted); font-size:13px;">Loading materials...</div>
        </div>

        <label style="margin-top: 32px; margin-bottom: 16px;">2. Your Cart</label>
        <div class="cart-section">
          <div class="cart-header">
            <h3>Items to Pickup</h3>
          </div>
          <div id="cartItems">
            <div class="empty-cart">No items in your cart. Click materials above to add.</div>
          </div>
          <div class="cart-total" id="cartTotalBar" style="display:none;">
            <div class="cart-total-label">Live Est. Total</div>
            <div class="cart-total-value" id="cartTotalValue">₹0</div>
          </div>
        </div>
        <div style="margin-top:24px;">
          <label>Photo (optional)</label>
          <input type="file" id="photo" accept="image/*">
        </div>
        <button type="submit" class="btn" style="margin-top:24px;">Schedule Pickup</button>
      </form>
    </div>

    <div class="dash-card">
      <h2>Your Pickups</h2>
      <ul class="pickup-list" id="pickupList"></ul>
    </div>
    <div class="dash-card">
      <h2>Your Payments</h2>
      <ul class="pickup-list" id="txnList"></ul>
    </div>
  </div>

  <script src="../js/api.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/toast.js"></script>
  <script>
    if (!auth.isLoggedIn() || auth.getRole() !== 'citizen') {
      window.location.href = '../auth/login.html';
    }
    const user = JSON.parse(localStorage.getItem('scrapchain_user') || '{}');
    document.getElementById('userName').textContent = user.name || user.email || '';
    document.getElementById('logoutBtn').onclick = () => auth.logout();

    let materials = [];
    let cart = {};

    const iconMap = {
      'Iron': '⛓️',
      'Copper': '⚡',
      'Plastic': '🛍️',
      'PET': '🥤',
      'E-Waste': '💻',
      'Paper': '📰',
      'Cardboard': '📦',
      'Glass': '🍾',
      'Aluminium': '🥫',
      'Brass': '🎷',
      'Battery': '🔋',
      'Vehicle': '🚗'
    };

    function getIcon(name) {
      for (const [key, icon] of Object.entries(iconMap)) {
        if (name.includes(key)) return icon;
      }
      return '♻️';
    }

    async function loadMaterials() {
      try {
        materials = await api.get('/api/materials');
        renderMaterialGrid();
      } catch (e) {
        console.error("Failed to load materials", e);
        document.getElementById('materialGrid').innerHTML = '<div style="color:var(--rust);">Failed to load materials.</div>';
      }
    }

    function renderMaterialGrid() {
      const grid = document.getElementById('materialGrid');
      grid.innerHTML = materials.map(m => `
        <div class="mat-card" onclick="addToCart('${m.id}')">
          <div class="mat-icon">${getIcon(m.name)}</div>
          <div class="mat-name" title="${m.name}">${m.name}</div>
          <div class="mat-price">₹${m.pricePerKg || 0}/kg</div>
        </div>
      `).join('');
    }

    window.addToCart = function (id) {
      if (!cart[id]) {
        cart[id] = 1; // Default to 1 kg when newly added
      } else {
        cart[id] += 1;
      }
      renderCart();
      updateTotal();
    };

    window.updateCartQty = function (id, delta) {
      if (!cart[id]) return;
      cart[id] += delta;
      cart[id] = Math.max(0, parseFloat(cart[id].toFixed(1)));
      if (cart[id] <= 0) {
        delete cart[id];
      }
      renderCart();
      updateTotal();
    };

    window.setCartQty = function (id, val) {
      const num = parseFloat(val);
      if (isNaN(num) || num <= 0) {
        delete cart[id];
      } else {
        cart[id] = num;
      }
      renderCart();
      updateTotal();
    };

    function renderCart() {
      const container = document.getElementById('cartItems');
      const keys = Object.keys(cart);

      if (keys.length === 0) {
        container.innerHTML = '<div class="empty-cart">No items in your cart. Click materials above to add.</div>';
        document.getElementById('cartTotalBar').style.display = 'none';
        return;
      }

      document.getElementById('cartTotalBar').style.display = 'flex';

      container.innerHTML = keys.map(id => {
        const m = materials.find(x => x.id === id);
        if (!m) return '';
        return `
        <div class="cart-item">
          <div class="cart-item-info">
            <div class="cart-item-icon">${getIcon(m.name)}</div>
            <div>
              <div class="cart-item-name">${m.name}</div>
              <div class="cart-item-price">₹${m.pricePerKg}/kg</div>
            </div>
          </div>
          <div class="cart-controls">
            <button type="button" class="cart-btn remove" onclick="updateCartQty('${id}', -1)">-</button>
            <input type="number" class="cart-qty" value="${cart[id]}" step="0.5" min="0" onchange="setCartQty('${id}', this.value)">
            <button type="button" class="cart-btn" onclick="updateCartQty('${id}', 1)">+</button>
          </div>
        </div>
        `;
      }).join('');
    }

    function updateTotal() {
      let total = 0;
      Object.entries(cart).forEach(([id, w]) => {
        const m = materials.find(x => x.id === id);
        if (m && w > 0) {
          total += (m.pricePerKg || 0) * w;
        }
      });
      document.getElementById('cartTotalValue').innerText = '₹' + Math.round(total);
    }

    document.getElementById('pickupForm').onsubmit = async (e) => {
      e.preventDefault();
      const errEl = document.getElementById('pickupError');
      errEl.style.display = 'none';
      const selections = [];
      Object.entries(cart).forEach(([mid, w]) => {
        if (mid && w > 0) selections.push({ materialId: mid, weightKg: w });
      });

      if (selections.length === 0) {
        errEl.textContent = 'Please add at least one item to your cart.';
        errEl.style.display = 'block';
        return;
      }
      let photoUrl = null;
      const photoInput = document.getElementById('photo');
      if (photoInput.files && photoInput.files[0]) {
        try {
          const fd = new FormData();
          fd.append('file', photoInput.files[0]);
          const up = await api.upload('/api/upload', fd);
          photoUrl = up.photoUrl;
        } catch (err) {
          errEl.textContent = 'Photo upload failed: ' + err.message;
          errEl.style.display = 'block';
          return;
        }
      }
      try {
        await api.post('/api/pickups', {
          address: document.getElementById('address').value,
          materials: selections,
          photoUrl,
        });
        document.getElementById('address').value = '';
        cart = {};
        renderCart();
        updateTotal();

        const submitBtn = document.querySelector('#pickupForm button[type="submit"]');
        const originalText = submitBtn.textContent;
        submitBtn.textContent = 'Scheduled Successfully ✓';
        submitBtn.style.background = '#28ca41';
        setTimeout(() => {
          submitBtn.textContent = originalText;
          submitBtn.style.background = '';
        }, 3000);

        loadPickups();
        if (window.toast) toast.success('Pickup scheduled successfully!');
      } catch (err) {
        errEl.textContent = err.message;
        errEl.style.display = 'block';
      }
    };

    async function loadPickups() {
      const ul = document.getElementById('pickupList');
      ul.innerHTML = '<li style="color:var(--muted);">Loading…</li>';
      try {
        const list = await api.get('/api/pickups');
        ul.innerHTML = list.length === 0
          ? '<li style="color:var(--muted);">No pickups yet.</li>'
          : list.map(p => `
            <li class="pickup-item">
              <div>
                <strong>${p.address || 'No address'}</strong><br>
                <span style="font-size:12px;color:var(--muted);">${p.status || 'pending'} · ${new Date(p.createdAt).toLocaleDateString()}</span>
              </div>
              <span>${p.amount ? '₹' + p.amount : '-'}</span>
            </li>
          `).join('');
      } catch (e) {
        ul.innerHTML = '<li style="color:var(--muted);">Failed to load pickups.</li>';
      }
    }

    async function loadTransactions() {
      try {
        const list = await api.get('/api/transactions');
        const ul = document.getElementById('txnList');
        ul.innerHTML = list.length === 0
          ? '<li style="color:var(--muted);">No payments yet.</li>'
          : list.map(t => `
            <li class="pickup-item">
              <div>
                <strong>₹${t.amount}</strong>
                <span style="font-size:12px;color:var(--muted);"> · ${new Date(t.createdAt).toLocaleDateString()}</span>
              </div>
            </li>
          `).join('');
      } catch (e) {
        document.getElementById('txnList').innerHTML = '<li style="color:var(--muted);">Unable to load.</li>';
      }
    }
    loadMaterials();
    loadPickups();
    loadTransactions();
  </script>
</body>

</html>
